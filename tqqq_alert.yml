name: TQQQ Daily Alert

on:
  schedule:
    # 한국시간 매일 오전 6:30 (UTC 21:30 = 미국 장 마감 후)
    - cron: '30 21 * * 1-5'   # 월~금만 실행
  workflow_dispatch:           # 수동 실행 버튼도 활성화

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance requests pandas pytz

      - name: 봇 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tqqq_telegram_bot.py
